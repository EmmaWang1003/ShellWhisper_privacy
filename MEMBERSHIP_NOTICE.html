    <style>

            --bg-gradient-end: #E0F7FA; /* Ice Blue */
            --text-color: #2c3e50;

            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);

        body {

        }

            text-align: right;
            direction: rtl;

            max-width: 800px;

            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2rem;
            text-align: center;
        }

            color: #666;
            font-size: 0.9rem;
            margin-bottom: 3rem;

        }

            margin-bottom: 0.8rem;

            margin-bottom: 0.5rem;

        @media (max-width: 600px) {

        }
    </style>

        function getLanguage() {
            const params = new URLSearchParams(window.location.search);
            let lang = params.get('lang');
            if (!lang) {
                // Try to get from navigator
                lang = navigator.language || navigator.userLanguage; 
            }
            
            // Normalize
            if (!lang) return 'en';
            
            // Exact match
            if (translations[lang]) return lang;
            
            // Prefix match (e.g. en-US -> en)
            const prefix = lang.split('-')[0];
            if (translations[prefix]) return prefix;
            
            // Specific fallbacks
            if (lang.startsWith('zh')) {
                return lang.includes('Hant') || lang.includes('TW') || lang.includes('HK') ? 'zh-Hant' : 'zh-Hans';
            }
            
            return 'en';
        }

        function render() {
            const lang = getLanguage();
            const data = translations[lang] || translations['en'];
            const isRTL = ['ar', 'fa'].includes(lang);
            
            document.documentElement.lang = lang;
            document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
            document.body.dir = isRTL ? 'rtl' : 'ltr';
            
            document.title = data.title;
            document.getElementById('content').innerHTML = data.content;
        }

        window.onload = render;
    </script>
