    <style>

    <script>
        const translations = {"en": {"title": "Privacy Policy - ShellWhisper", "content": "\n        <h1>Privacy Policy</h1>\n        <p class=\"last-updated\">Last Updated: March 16, 2026</p>\n\n        <h2>1. Introduction</h2>\n        <p>Welcome to <strong>ShellWhisper</strong> (\"we,\" \"our,\" or \"us\"). We are committed to protecting your privacy and ensuring you have a positive experience on our website and in using our mobile application (the \"App\"). This Privacy Policy applies to your use of the App and any related services.</p>\n\n        <h2>2. Data We Collect</h2>\n\n        <h3>2.1 Microphone Usage</h3>\n        <p>The App requires access to your device's microphone to function. We record your voice input <strong>solely</strong> for the purpose of processing your requests and generating responses.</p>\n        <ul>\n            <li><strong>Real-time Processing:</strong> Audio data is processed in real-time.</li>\n            <li><strong>Transitory Nature:</strong> Audio recordings are processed to generate text transcripts and are not permanently stored on our servers unless explicitly saved by you as a \"Memory\" in the App.</li>\n        </ul>\n\n        <h3>2.2 User-Generated Content</h3>\n        <ul>\n            <li><strong>Memories:</strong> When you save a conversation as a memory, the text transcript and associated metadata (e.g., emotion tags, timestamps) are stored.</li>\n            <li><strong>Storage:</strong> This data is stored locally on your device and synchronized via <strong>iCloud</strong> (CloudKit) if enabled. We do not have direct access to your private iCloud data.</li>\n        </ul>\n\n        <h3>2.3 Device and Usage Data</h3>\n        <p>We may collect anonymous usage data to improve app performance, including:</p>\n        <ul>\n            <li>Device type and operating system version.</li>\n            <li>Crash reports and performance metrics.</li>\n            <li>Feature usage statistics (e.g., which themes are most popular).</li>\n        </ul>\n\n        <h2>3. Third-Party Services</h2>\n        <p>We use the following third-party services to provide core functionality:</p>\n\n        <h3>3.1 AI Processing (OpenAI & DeepSeek)</h3>\n        <ul>\n            <li><strong>Text Processing:</strong> To generate intelligent responses, text transcripts of your voice input are sent to third-party AI providers.</li>\n            <li><strong>Providers:</strong>\n                <ul>\n                    <li><strong>OpenAI:</strong> Used for users in supported regions. <a href=\"https://openai.com/privacy\" target=\"_blank\">OpenAI Privacy Policy</a></li>\n                    <li><strong>DeepSeek:</strong> Used for users in mainland China or as a fallback. <a href=\"https://www.deepseek.com/privacy\" target=\"_blank\">DeepSeek Privacy Policy</a></li>\n                </ul>\n            </li>\n            <li><strong>Data Safety:</strong> We do not send personally identifiable information (PII) to these services. Only the text of your current conversation is transmitted.</li>\n        </ul>\n\n        <h3>3.2 Speech-to-Text (Apple Speech & OpenAI Whisper)</h3>\n        <ul>\n            <li><strong>Voice Processing:</strong> For real-time transcription, audio data may be processed securely on-device via Apple's Speech framework, or transmitted to OpenAI's Whisper API for accurate recognition. <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\">Apple Privacy Policy</a> | <a href=\"https://openai.com/privacy\" target=\"_blank\">OpenAI Privacy Policy</a></li>\n        </ul>\n\n        <h3>3.3 Subscription Management (Apple StoreKit)</h3>\n        <ul>\n            <li><strong>Payments:</strong> We use Apple's In-App Purchase system (StoreKit) to manage auto-renewable subscriptions.</li>\n            <li><strong>Data:</strong> Apple processes your payments and validates your subscription status. We do not process or store your credit card information directly. Your subscription is linked to your Apple ID. <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\">Apple Privacy Policy</a></li>\n        </ul>\n\n        <h2>4. Data Retention</h2>\n        <ul>\n            <li><strong>Local Data:</strong> Data stored locally on your device remains there until you delete the App or clear the data.</li>\n            <li><strong>iCloud Data:</strong> Data synced to iCloud is retained according to your Apple ID settings.</li>\n            <li><strong>Server Logs:</strong> We do not maintain a central database of user conversations.</li>\n        </ul>\n\n        <h2>5. Your Rights</h2>\n        <ul>\n            <li><strong>Access & Deletion:</strong> You can view and delete your saved memories directly within the App.</li>\n            <li><strong>Revoke Permissions:</strong> You can revoke microphone access at any time in your device Settings.</li>\n        </ul>\n\n        <h2>6. Children's Privacy</h2>\n        <p>The App is not intended for users under the age of 17. We do not knowingly collect personal information from children.</p>\n\n        <h2>7. Changes to This Policy</h2>\n        <p>We may update this Privacy Policy from time to time. We will notify you of any changes by posting the new Privacy Policy on this page.</p>\n\n        <h2>8. Contact Us</h2>\n        <p>If you have any questions about this Privacy Policy, please contact us at:</p>\n        <p><a href=\"mailto:wangqy19901003@gmail.com\">wangqy19901003@gmail.com</a></p>\n    "}, "zh-Hans": {"title": "隐私政策 - ShellWhisper", "content": "\n        <h1>隐私政策</h1>\n        <p class=\"last-updated\">最后更新：2026年3月16日</p>\n\n        <h2>1. 简介</h2>\n        <p>欢迎使用 <strong>ShellWhisper</strong>（“我们”）。我们致力于保护您的隐私，并确保您在使用我们的移动应用程序（“App”）时拥有积极的体验。本隐私政策适用于您对 App 及相关服务的使用。</p>\n\n        <h2>2. 我们收集的数据</h2>\n\n        <h3>2.1 麦克风使用</h3>\n        <p>App 需要访问您设备的麦克风才能运行。我们记录您的语音输入<strong>仅</strong>用于处理您的请求并生成回复。</p>\n        <ul>\n            <li><strong>实时处理：</strong> 音频数据是实时处理的。</li>\n            <li><strong>瞬时性：</strong> 音频录音经处理生成文本记录，不会永久存储在我们的服务器上，除非您在 App 中明确将其保存为“记忆”。</li>\n        </ul>\n\n        <h3>2.2 用户生成内容</h3>\n        <ul>\n            <li><strong>记忆：</strong> 当您将对话保存为记忆时，文本记录和相关元数据（如情绪标签、时间戳）将被存储。</li>\n            <li><strong>存储：</strong> 这些数据存储在您的本地设备上，如果启用，将通过 <strong>iCloud</strong> (CloudKit) 同步。我们无法直接访问您的 iCloud 私有数据。</li>\n        </ul>\n\n        <h3>2.3 设备和使用数据</h3>\n        <p>我们可能会收集匿名使用数据以改进 App 性能，包括：</p>\n        <ul>\n            <li>设备类型和操作系统版本。</li>\n            <li>崩溃报告和性能指标。</li>\n            <li>功能使用统计（例如，哪些主题最受欢迎）。</li>\n        </ul>\n\n        <h2>3. 第三方服务</h2>\n        <p>我们使用以下第三方服务来提供核心功能：</p>\n\n        <h3>3.1 AI 处理 (OpenAI & DeepSeek)</h3>\n        <ul>\n            <li><strong>文本处理：</strong> 为了生成智能回复，您语音输入的文本记录将被发送给第三方 AI 提供商。</li>\n            <li><strong>提供商：</strong>\n                <ul>\n                    <li><strong>OpenAI：</strong> 用于支持区域的用户。<a href=\"https://openai.com/privacy\" target=\"_blank\">OpenAI 隐私政策</a></li>\n                    <li><strong>DeepSeek：</strong> 用于中国大陆用户或作为备用。<a href=\"https://www.deepseek.com/privacy\" target=\"_blank\">DeepSeek 隐私政策</a></li>\n                </ul>\n            </li>\n            <li><strong>数据安全：</strong> 我们不会向这些服务发送个人身份信息 (PII)。仅传输当前对话的文本。</li>\n        </ul>\n\n        <h3>3.2 语音转文字 (Apple Speech & OpenAI Whisper)</h3>\n        <ul>\n            <li><strong>语音处理：</strong> 对于实时转录，音频数据可能通过 Apple 的 Speech 框架在端侧安全处理，或传输至 OpenAI 的 Whisper API 进行精确识别。<a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\">Apple 隐私政策</a> | <a href=\"https://openai.com/privacy\" target=\"_blank\">OpenAI 隐私政策</a></li>\n        </ul>\n\n        <h3>3.3 订阅管理 (Apple StoreKit)</h3>\n        <ul>\n            <li><strong>支付：</strong> 我们使用 Apple 的应用内购买系统 (StoreKit) 来管理自动续费订阅。</li>\n            <li><strong>数据：</strong> Apple 处理您的付款并验证您的订阅状态。我们不直接处理或存储您的信用卡信息。您的订阅与您的 Apple ID 关联。<a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\">Apple 隐私政策</a></li>\n        </ul>\n\n        <h2>4. 数据保留</h2>\n        <ul>\n            <li><strong>本地数据：</strong> 存储在您设备本地的数据将保留，直到您删除 App 或清除数据。</li>\n            <li><strong>iCloud 数据：</strong> 同步到 iCloud 的数据根据您的 Apple ID 设置保留。</li>\n            <li><strong>服务器日志：</strong> 我们不维护用户对话的中央数据库。</li>\n        </ul>\n\n        <h2>5. 您的权利</h2>\n        <ul>\n            <li><strong>访问与删除：</strong> 您可以直接在 App 内查看和删除已保存的记忆。</li>\n            <li><strong>撤销权限：</strong> 您可以随时在设备设置中撤销麦克风访问权限。</li>\n        </ul>\n\n        <h2>6. 儿童隐私</h2>\n        <p>本 App 不适用于 17 岁以下的用户。我们不会故意收集儿童的个人信息。</p>\n\n        <h2>7. 本政策的变更</h2>\n        <p>我们可能会不时更新本隐私政策。我们将通过在此页面上发布新的隐私政策来通知您任何变更。</p>\n\n        <h2>8. 联系我们</h2>\n        <p>如果您对本隐私政策有任何疑问，请联系我们：</p>\n        <p><a href=\"mailto:wangqy19901003@gmail.com\">wangqy19901003@gmail.com</a></p>\n    "}, "zh-Hant": {"title": "隱私政策 - ShellWhisper", "content": "\n        <h1>隱私政策</h1>\n        <p class=\"last-updated\">最后更新：2026年3月16日</p>\n\n        <h2>1. 简介</h2>\n        <p>欢迎使用 <strong>ShellWhisper</strong>（“我们”）。我们致力于保护您的隱私，并确保您在使用我们的移动应用程序（“App”）时拥有积极的体验。本隱私政策适用于您对 App 及相关服务的使用。</p>\n\n        <h2>2. 我们收集的数据</h2>\n\n        <h3>2.1 麥克風使用</h3>\n        <p>App 需要访问您设备的麥克風才能运行。我们记录您的语音输入<strong>僅</strong>用于处理您的请求并生成回复。</p>\n        <ul>\n            <li><strong>实时处理：</strong> 音频数据是实时处理的。</li>\n            <li><strong>瞬时性：</strong> 音频录音经处理生成文本记录，不会永久存储在我们的伺服器上，除非您在 App 中明确将其保存为“記憶”。</li>\n        </ul>\n\n        <h3>2.2 用戶生成内容</h3>\n        <ul>\n            <li><strong>記憶：</strong> 当您将对话保存为記憶时，文本记录和相关元数据（如情绪标签、时间戳）将被存储。</li>\n            <li><strong>存储：</strong> 这些数据存储在您的本地设备上，如果启用，将通过 <strong>iCloud</strong> (CloudKit) 同步。我们无法直接访问您的 iCloud 私有数据。</li>\n        </ul>\n\n        <h3>2.3 设备和使用数据</h3>\n        <p>我们可能会收集匿名使用数据以改进 App 性能，包括：</p>\n        <ul>\n            <li>设备类型和操作系统版本。</li>\n            <li>崩溃报告和性能指标。</li>\n            <li>功能使用统计（例如，哪些主题最受欢迎）。</li>\n        </ul>\n\n        <h2>3. 第三方服务</h2>\n        <p>我们使用以下第三方服务来提供核心功能：</p>\n\n        <h3>         function getLanguage() {
            const params = new URLSearchParams(window.location.search);
            let lang = params.get('lang');
            if (!lang) {
                // Try to get from navigator
                lang = navigator.language || navigator.userLanguage; 
            }
            
            // Normalize
            if (!lang) return 'en';
            
            // Exact match
            if (translations[lang]) return lang;
            
            // Prefix match (e.g. en-US -> en)
            const prefix = lang.split('-')[0];
            if (translations[prefix]) return prefix;
            
            // Specific fallbacks
            if (lang.startsWith('zh')) {
                return lang.includes('Hant') || lang.includes('TW') || lang.includes('HK') ? 'zh-Hant' : 'zh-Hans';
            }
            
            return 'en';
        }

        function render() {
            const lang = getLanguage();
            const data = translations[lang] || translations['en'];
            const isRTL = ['ar', 'fa'].includes(lang);
            
            document.documentElement.lang = lang;
            document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
            document.body.dir = isRTL ? 'rtl' : 'ltr';
            
            document.title = data.title;
            document.getElementById('content').innerHTML = data.content;
        }

        window.onload = render;
    </script>

</head>
